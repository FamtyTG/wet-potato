<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wet Potato</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Full Clay UI Redesign Palette */
            --bg-color: #2a2726;       /* Глубокий серо-коричневый (теплый) */
            --card-bg: #373331;        /* Чуть светлее для карточек/лобби */
            --btn-peach: #f5bca9;      /* Пастельно-персиковый */
            --btn-mint: #b2dfdb;       /* Пастельно-зеленоватый для начала игры */
            --btn-purple: #c3b4d4;     /* Пастельно-фиолетовый */
            --text-light: #fbece0;     /* Очень мягкий бежево-белый для текста */
            --text-dark: #2a2726;      /* Контрастный темный для кнопок */
            --text-muted: #a49692;     /* Приглушенный текст */
            --danger: #ff6b6b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            touch-action: none;
        }

        #app {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            padding: 24px;
        }
        .screen.active {
            opacity: 1;
            pointer-events: auto;
        }
        
        #screen-game {
            justify-content: flex-start;
            padding-top: 50px;
        }

        /* 
         * Soft Clay UI Components
         * Мягкая глина: пухлые радиусы, правильные тени для объема (блик сверху-слева, тень снизу-справа). 
         */
        .clay-card {
            background-color: var(--card-bg);
            border-radius: 35px;
            padding: 35px 25px;
            box-shadow: 
                5px 5px 15px rgba(0, 0, 0, 0.3),                 /* Внешняя тень */
                inset 2px 2px 5px rgba(255, 255, 255, 0.05),     /* Внутренний блик для объема */
                inset -2px -2px 5px rgba(0, 0, 0, 0.15);         /* Внутреннее затенение */
            width: 100%;
            max-width: 340px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .clay-btn {
            border: none;
            border-radius: 25px;
            padding: 16px 24px;
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text-dark);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            /* Эффект матового пластилина */
            box-shadow: 
                5px 5px 15px rgba(0,0,0,0.3),
                inset 3px 3px 6px rgba(255,255,255,0.4),
                inset -3px -3px 6px rgba(0,0,0,0.1);
        }
        .clay-btn:active {
            transform: scale(0.95) translateY(2px);
            box-shadow: 
                2px 2px 8px rgba(0,0,0,0.3),
                inset 4px 4px 8px rgba(0,0,0,0.15),
                inset -2px -2px 4px rgba(255,255,255,0.2);
        }

        .input-code {
            background-color: #2e2a29;
            border: none;
            outline: none;
            border-radius: 20px;
            padding: 16px;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-light);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 5px;
            width: 100%;
            margin-bottom: 5px;
            /* Внутренний объем (вдавленность) */
            box-shadow: 
                inset 4px 4px 10px rgba(0,0,0,0.4), 
                inset -2px -2px 5px rgba(255,255,255,0.03);
            font-family: 'Inter', sans-serif;
        }
        .input-code::placeholder {
            color: rgba(255,255,255,0.1);
        }

        /* typography / UI blocks */
        .logo-title {
            font-size: 3.2rem;
            font-weight: 800;
            color: var(--btn-peach);
            text-shadow: 4px 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.1;
        }

        .player-row {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            margin-bottom: 10px;
            box-shadow: 
                inset 2px 2px 6px rgba(0,0,0,0.3), 
                inset -1px -1px 3px rgba(255,255,255,0.02);
            animation: showPlayer 0.3s ease-out;
        }
        @keyframes showPlayer {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .player-avatar {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: var(--btn-purple);
            color: var(--text-dark);
            font-weight: 800;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            box-shadow: 
                inset 2px 2px 5px rgba(255,255,255,0.6), 
                inset -2px -2px 5px rgba(0,0,0,0.2);
        }
        .player-name {
            font-weight: 600;
            font-size: 1.05rem;
            letter-spacing: 0.5px;
        }

        /* Game UI */
        .status-text {
            color: var(--text-muted);
            font-size: 1.05rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 15px;
        }
        .task-card {
            color: var(--btn-peach);
            font-size: 1.3rem;
            font-weight: 600;
            transition: opacity 0.3s;
            min-height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.4;
            margin-bottom: 15px;
        }
        .personal-timer {
            font-size: 6rem;
            font-weight: 800;
            color: var(--btn-purple);
            text-shadow: 5px 5px 12px rgba(0,0,0,0.4);
            margin: 10px 0 20px 0;
            font-variant-numeric: tabular-nums;
            transition: opacity 0.3s;
        }

        #potato-area {
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #potato-container {
            width: 260px;
            height: 260px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
        }
        #potato-pulse-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            will-change: transform;
            cursor: grab;
        }
        #potato-pulse-wrapper:active {
            cursor: grabbing;
        }

        /* 
         * Potato Dynamics 
         * Бугристая, живая капля через сложный border-radius
         */
        .potato {
            width: 210px;
            height: 210px;
            background: linear-gradient(135deg, var(--btn-purple), var(--btn-peach));
            box-shadow: 
                15px 15px 30px rgba(0, 0, 0, 0.4), 
                inset 5px 5px 15px rgba(255, 255, 255, 0.4),
                inset -5px -5px 20px rgba(0, 0, 0, 0.2);
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            animation: morphPotato 5s ease-in-out infinite, rotatePotato 15s linear infinite;
        }

        @keyframes morphPotato {
            0%   { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
            25%  { border-radius: 60% 40% 50% 50% / 50% 70% 40% 60%; }
            50%  { border-radius: 50% 50% 30% 70% / 60% 40% 50% 40%; }
            75%  { border-radius: 30% 70% 60% 40% / 40% 60% 70% 50%; }
            100% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
        }
        @keyframes rotatePotato {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="app">
        <!-- СТАРТОВЫЙ ЭКРАН -->
        <div id="screen-start" class="screen active">
            <h1 class="logo-title">WET<br>POTATO</h1>
            <button class="clay-btn" id="btn-create-lobby" style="background-color: var(--btn-peach); width: 100%; max-width: 320px; font-size: 1.15rem; padding: 20px; margin-bottom: 40px;">Создать лобби</button>
            
            <div class="clay-card">
                <p style="margin-bottom: 5px; font-weight: 600; font-size: 0.95rem; color: var(--text-muted);">Или введите код комнаты</p>
                <input type="text" id="join-code-input" class="input-code" placeholder="----" maxlength="5">
                <button class="clay-btn" id="btn-join-code" style="background-color: var(--btn-purple); width: 100%;">Войти по коду</button>
            </div>
        </div>

        <!-- ЭКРАН ЛОББИ -->
        <div id="screen-lobby" class="screen">
            <div class="clay-card">
                <h2 style="color: var(--btn-peach); font-size: 1rem; text-transform: uppercase; letter-spacing: 2px;">Код лобби</h2>
                <h1 id="lobby-id-display" style="font-size: 4rem; letter-spacing: 8px; margin: 0 0 20px 0; text-shadow: 3px 3px 6px rgba(0,0,0,0.3);"></h1>
                
                <div id="lobby-players" style="margin-bottom: 15px;">
                    <!-- Заполняется JS -->
                </div>
                
                <button class="clay-btn" id="btn-invite" style="background-color: var(--btn-purple); width: 100%;">Пригласить друзей</button>
                <button class="clay-btn" id="btn-start-game" style="display:none; background-color: var(--btn-mint); width: 100%; color: var(--text-dark);">Начать игру</button>
                <div id="wait-host-msg" style="display:none; color: var(--text-muted); font-size: 0.9rem; margin-top: 5px;">Ожидание создателя...</div>
            </div>
        </div>

        <!-- ГЛАВНЫЙ ИГРОВОЙ ЭКРАН -->
        <div id="screen-game" class="screen">
            <div id="status-text" class="status-text">Ожидание первого хода...</div>
            <div id="task-display" class="clay-card task-card" style="opacity: 0;">Задание появится здесь</div>
            <div id="personal-timer" class="personal-timer" style="opacity: 0;">10.0</div>
            
            <div id="potato-area">
                <div id="potato-container" style="opacity: 0; transform: scale(0);">
                    <div id="potato-pulse-wrapper">
                        <div class="potato"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ЭКРАН GAMEOVER -->
        <div id="screen-gameover" class="screen">
            <div class="clay-card">
                <h1 style="color: var(--danger); font-size: 3.5rem; text-shadow: 3px 3px 6px rgba(0,0,0,0.4);">BOOM!</h1>
                <h2 id="loser-name" style="margin: 10px 0 25px 0; color: var(--text-light); font-size: 1.4rem;">ИМЯ ВЗОРВАЛСЯ!</h2>
                <button class="clay-btn" id="btn-to-lobby" style="background-color: var(--btn-peach); width: 100%;">В меню</button>
            </div>
        </div>
    </div>

    <script>
        // Предотвращение нативного скролла
        document.body.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

        // Telegram WebApp Setup
        const tg = window.Telegram?.WebApp || {};
        const isTg = !!tg.initData;
        if(isTg) {
            tg.expand();
            tg.enableClosingConfirmation();
        }

        // Utils
        function generateCode() {
            let res = '';
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            for (let i = 0; i < 5; i++) {
                res += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return res;
        }

        // Parse Init Data
        let initData = tg.initDataUnsafe || {};
        let startParam = initData.start_param || null;
        if (!startParam && window.location.search.includes('startapp=')) {
            startParam = new URLSearchParams(window.location.search).get('startapp');
        }

        let currentUser = initData.user || {
            id: Math.floor(Math.random() * 100000),
            first_name: "Игрок " + Math.floor(Math.random() * 100)
        };

        // Tasks Bank (50 коротких веселых заданий)
        const tasks = [
            "Назови 3 марки авто", "Покажи язык всем", "Скажи алфавит наоборот", "Назови 3 фильма ужасов", "Мычи мелодию",
            "Придумай рифму к слову Картошка", "Потрогай уши соседа", "Скажи 5 слов на букву П", "Зажмурься и посчитай до 10", "Назови 3 круглых фрукта",
            "Расскажи короткую шутку", "Назови 3 песни про Новый Год", "Изобрази злого кота", "Сделай смешную гримасу", "Назови 3 столицы Европы",
            "Подмигни 3 раза", "Назови 3 породы собак", "Прокукарекай", "Хрюкни 2 раза", "Назови 3 реки", 
            "Сделай виртуальное колесо", "Мяукни как котенок", "Гавкни как собака", "Посчитай от 10 до 1 вслух", "Назови 3 красных вещи вокруг", 
            "Изобрази обезьяну", "Скажи скороговорку", "Назови 3 планеты", "Назови 3 языка программирования", "Назови 3 вида птиц", 
            "Сделай волну руками", "Сыграй на воздушной гитаре", "Назови 3 овоща", "Пошли воздушный поцелуй", "Назови 3 вида спорта", 
            "Изобрази зомби", "Назови 3 марки телефона", "Покрутись на месте", "Назови 3 горячих напитка", "Изобрази пингвина", 
            "Назови 3 супергероя", "Назови 3 предмета в комнате", "Дай пять воздуху", "Назови 3 музыкальных инструмента", "Изобрази плавание", 
            "Назови 3 ягоды", "Назови 3 станции метро", "Расскажи секрет шепотом", "Назови 3 вида транспорта", "Изобрази робота"
        ];

        // --- Mock Network Manager ---
        class NetworkManager {
            constructor() {
                this.lobbyId = null;
                this.players = [];
                this.isHost = false;
                this.onPlayerJoined = null;
                this.onGameStarted = null;
                this.onPotatoReceived = null;
                this.botTimers = [];
                this.botPassBack = null;
            }

            connect(lobbyId, isHost = false) {
                this.lobbyId = lobbyId.toUpperCase();
                this.isHost = isHost;
                
                this.players.push({ id: currentUser.id, name: currentUser.first_name, isHost });
                if (this.onPlayerJoined) this.onPlayerJoined(this.players);

                if (isHost) {
                    this.botTimers.push(setTimeout(() => {
                        this.players.push({ id: 2, name: "Bot 1" });
                        if (this.onPlayerJoined) this.onPlayerJoined(this.players);
                        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                    }, 1500));
                    this.botTimers.push(setTimeout(() => {
                        this.players.push({ id: 3, name: "Bot 2" });
                        if (this.onPlayerJoined) this.onPlayerJoined(this.players);
                        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                    }, 3500));
                } else {
                    this.players.push({ id: 1, name: "Лобби Хост", isHost: true });
                    if (this.onPlayerJoined) this.onPlayerJoined(this.players);
                    
                    this.botTimers.push(setTimeout(() => {
                        if (currentScreen === 'LOBBY' && this.onGameStarted) this.onGameStarted();
                    }, 4000));
                }
            }

            startGame() {
                if (this.onGameStarted) this.onGameStarted();
                setTimeout(() => {
                    if (this.onPotatoReceived) this.onPotatoReceived();
                }, 1000);
            }

            sendPotato(targetUserId) {
                let delay = 1500 + Math.random() * 1500;
                this.botPassBack = setTimeout(() => {
                    if (currentScreen === 'GAME' && !isGameOver) {
                        if (this.onPotatoReceived) this.onPotatoReceived();
                    }
                }, delay);
            }

            cleanup() {
                this.botTimers.forEach(t => clearTimeout(t));
                if (this.botPassBack) clearTimeout(this.botPassBack);
            }
        }

        // --- Core State ---
        let network = new NetworkManager();
        let currentScreen = 'START';
        let isGameOver = false;
        
        let globalTimer = 0; 
        let personalTimer = 0; 
        let hasPotato = false;
        
        let pulsePhase = 0;
        let lastTime = performance.now();
        let lastTimeStrDisplay = "10.0";

        const ui = {
            statusText: document.getElementById('status-text'),
            taskDisplay: document.getElementById('task-display'),
            personalTimer: document.getElementById('personal-timer'),
            wrapper: document.getElementById('potato-pulse-wrapper'),
            container: document.getElementById('potato-container')
        };

        function initApp() {
            if (startParam) {
                joinLobby(startParam, false);
            } else {
                showScreen('START');
            }
        }
        
        function showScreen(name) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(`screen-${name.toLowerCase()}`).classList.add('active');
            currentScreen = name;
        }

        // 1. СТАРТ
        document.getElementById('btn-create-lobby').addEventListener('click', () => {
            joinLobby(generateCode(), true);
        });

        const codeInput = document.getElementById('join-code-input');
        codeInput.addEventListener('input', function() { this.value = this.value.toUpperCase(); });
        
        document.getElementById('btn-join-code').addEventListener('click', () => {
            let val = codeInput.value.trim();
            if(val.length > 0) joinLobby(val, false);
        });

        // 2. ЛОББИ
        function joinLobby(lobbyId, isHost = false) {
            showScreen('LOBBY');
            document.getElementById('lobby-id-display').innerText = lobbyId;
            
            document.getElementById('btn-start-game').style.display = isHost ? 'block' : 'none';
            document.getElementById('wait-host-msg').style.display = isHost ? 'none' : 'block';

            network.onPlayerJoined = (players) => {
                let list = document.getElementById('lobby-players');
                list.innerHTML = '';
                players.forEach(p => {
                    let initials = p.name ? p.name.substring(0,2).toUpperCase() : '??';
                    list.innerHTML += `
                        <div class="player-row">
                            <div class="player-avatar">${initials}</div>
                            <div class="player-name">${p.name} ${p.isHost ? '(Host)' : ''}</div>
                        </div>`;
                });
            };

            network.onGameStarted = () => startRound();
            network.onPotatoReceived = () => localReceivePotato();

            network.connect(lobbyId, isHost);
        }

        document.getElementById('btn-invite').addEventListener('click', () => {
             if (tg.switchInlineQuery) {
                 tg.switchInlineQuery(network.lobbyId, ["users", "groups"]);
             } else {
                 alert("Ссылка: https://t.me/your_bot?startapp=" + network.lobbyId);
             }
        });

        document.getElementById('btn-start-game').addEventListener('click', () => network.startGame());

        // 3. ИГРА
        function startRound() {
            isGameOver = false;
            hasPotato = false;
            globalTimer = 20 + Math.random() * 25; // Скрытый 20-45 сек
            
            ui.statusText.innerText = "Ожидание первого хода...";
            ui.taskDisplay.style.opacity = '0';
            ui.personalTimer.style.opacity = '0';
            
            ui.container.style.transition = 'none';
            ui.container.style.opacity = '0';
            ui.container.style.transform = 'scale(0)';
            
            showScreen('GAME');
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function gameLoop(time) {
            if (currentScreen !== 'GAME' || isGameOver) {
                lastTime = time;
                if(!isGameOver) requestAnimationFrame(gameLoop);
                return;
            }

            let dt = (time - lastTime) / 1000;
            if (dt > 0.1) dt = 0.1;
            lastTime = time;

            globalTimer -= dt;

            if (hasPotato) {
                personalTimer -= dt;
                updatePulse(dt);

                let tStr = Math.max(0, personalTimer).toFixed(1);
                if (tStr !== lastTimeStrDisplay) {
                    ui.personalTimer.innerText = tStr;
                    lastTimeStrDisplay = tStr;
                }

                if (personalTimer <= 0 || globalTimer <= 0) {
                    triggerGameOver(currentUser.first_name);
                    return;
                }
            } else {
                if (globalTimer <= 0) {
                    triggerGameOver("Бот");
                    return;
                }
            }

            requestAnimationFrame(gameLoop);
        }

        function updatePulse(dt) {
            let speedMult = 1 + (10 - Math.max(0, personalTimer)) * 0.3;
            let pulseRate = Math.PI * 2 * speedMult;
            
            let oldPhase = pulsePhase;
            pulsePhase += dt * pulseRate;
            
            let scale = 1 + Math.sin(pulsePhase) * 0.08;
            ui.wrapper.style.transform = `scale(${scale})`;
            
            let oldCycle = Math.floor(oldPhase / (Math.PI * 2));
            let newCycle = Math.floor(pulsePhase / (Math.PI * 2));
            
            if (newCycle > oldCycle && window.Telegram?.WebApp?.HapticFeedback) {
                if (personalTimer > 6) tg.HapticFeedback.impactOccurred('light');
                else if (personalTimer > 3) tg.HapticFeedback.impactOccurred('medium');
                else tg.HapticFeedback.impactOccurred('heavy');
            }
        }

        function localReceivePotato() {
            hasPotato = true;
            personalTimer = 10;
            pulsePhase = 0;
            
            ui.statusText.innerText = "ТВОЙ ХОД!";
            ui.taskDisplay.innerText = tasks[Math.floor(Math.random() * tasks.length)];
            
            ui.taskDisplay.style.opacity = '1';
            ui.personalTimer.style.opacity = '1';
            
            if (window.Telegram?.WebApp?.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning');
            
            ui.container.style.transition = 'none';
            ui.container.style.transform = `translate(0, -${window.innerHeight/2}px) scale(0.5)`;
            ui.container.style.opacity = '0';
            
            void ui.container.offsetWidth;
            
            ui.container.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease';
            ui.container.style.transform = `translate(0px, 0px) scale(1)`;
            ui.container.style.opacity = '1';
        }

        // 4. Свайп (Touch & Mouse/Десктоп)
        let isDragging = false;
        let startX=0, startY=0, curX=0, curY=0;

        function handleDragStart(clientX, clientY) {
            if (currentScreen !== 'GAME' || !hasPotato || isGameOver) return;
            isDragging = true;
            startX = clientX;
            startY = clientY;
            curX = startX;
            curY = startY;
            ui.container.style.transition = 'none';
        }

        function handleDragMove(clientX, clientY) {
            if (!isDragging || !hasPotato) return;
            curX = clientX;
            curY = clientY;
            ui.container.style.transform = `translate(${(curX - startX) * 0.5}px, ${(curY - startY) * 0.5}px)`;
        }

        function handleDragEnd() {
            if (!isDragging || !hasPotato) return;
            isDragging = false;
            
            let dx = curX - startX;
            let dy = curY - startY;
            let dist = Math.hypot(dx, dy);
            
            if (dist > 40) {
                let angle = Math.atan2(dy, dx);
                localPassPotato(angle);
            } else {
                ui.container.style.transition = 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                ui.container.style.transform = 'translate(0px, 0px)';
                setTimeout(() => ui.container.style.transition = 'none', 300);
            }
        }

        // Подключаем Touch
        ui.container.addEventListener('touchstart', e => handleDragStart(e.touches[0].clientX, e.touches[0].clientY), {passive:false});
        window.addEventListener('touchmove', e => { if(isDragging) handleDragMove(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
        window.addEventListener('touchend', e => handleDragEnd());
        
        // Подключаем Mouse (для игры на десктопном клиенте)
        ui.container.addEventListener('mousedown', e => handleDragStart(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => { if (isDragging) handleDragMove(e.clientX, e.clientY); });
        window.addEventListener('mouseup', e => handleDragEnd());

        function localPassPotato(angle) {
            hasPotato = false;
            ui.taskDisplay.style.opacity = '0';
            ui.personalTimer.style.opacity = '0';
            ui.statusText.innerText = "Летит к другому...";
            
            if (window.Telegram?.WebApp?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            
            let flyDist = window.innerWidth * 1.5;
            ui.container.style.transition = 'transform 0.4s ease-out, opacity 0.3s ease';
            ui.container.style.transform = `translate(${Math.cos(angle)*flyDist}px, ${Math.sin(angle)*flyDist}px) scale(0.3)`;
            ui.container.style.opacity = '0';
            
            network.sendPotato('someone');
        }

        // 5. GAMEOVER
        function triggerGameOver(loserName) {
            isGameOver = true;
            if (window.Telegram?.WebApp?.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('rigid');
                tg.HapticFeedback.notificationOccurred('error');
            }
            document.getElementById('loser-name').innerText = `${loserName} ВЗОРВАЛСЯ!`;
            showScreen('GAMEOVER');
        }

        document.getElementById('btn-to-lobby').addEventListener('click', () => {
            network.cleanup(); 
            network = new NetworkManager();
            initApp();
        });

        // Запуск
        initApp();

    </script>
</body>
</html>
