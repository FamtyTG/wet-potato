<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wet Potato</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Claymorphism Color Palette */
            --bg-color: #2a2726; /* Темный теплый фон */
            --clay-dark: #353130; /* Более светлый тон для подложек */
            --clay-peach: #fbece0; /* Пастельный персиковый */
            --clay-purple: #cdb4db; /* Пастельный фиолетовый */
            --clay-blue: #a7cbf2; /* Пастельный синий */
            --text-light: #fdf6e3;
            --text-dark: #2a2726;
            --text-muted: #a09794;
            --danger: #ff6b6b;
            
            /* Clay Shadows */
            --clay-shadow-out: 10px 10px 20px rgba(0,0,0,0.3), -10px -10px 20px rgba(255,255,255,0.03);
            --clay-shadow-in: inset 4px 4px 10px rgba(255,255,255,0.05), inset -4px -4px 10px rgba(0,0,0,0.4);
            
            --btn-shadow-out: 6px 6px 14px rgba(0,0,0,0.3), -6px -6px 14px rgba(255,255,255,0.05);
            --btn-shadow-in: inset 3px 3px 6px rgba(255,255,255,0.7), inset -3px -3px 6px rgba(0,0,0,0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            touch-action: none;
        }

        #app {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            padding: 24px;
        }
        .screen.active {
            opacity: 1;
            pointer-events: auto;
        }
        
        #screen-game {
            justify-content: flex-start;
            padding-top: 40px;
        }

        /* Clay Components */
        .clay-card {
            background-color: var(--clay-dark);
            border-radius: 20px;
            padding: 24px;
            box-shadow: var(--clay-shadow-out), var(--clay-shadow-in);
            width: 100%;
            max-width: 320px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .clay-btn {
            background-color: var(--clay-peach);
            color: var(--text-dark);
            border: none;
            border-radius: 20px;
            padding: 16px 24px;
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: var(--btn-shadow-out), var(--btn-shadow-in);
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }
        .clay-btn:active {
            transform: scale(0.96) translateY(2px);
            box-shadow: 
                2px 2px 5px rgba(0,0,0,0.3), -2px -2px 5px rgba(255,255,255,0.03),
                inset 3px 3px 8px rgba(0,0,0,0.1), inset -3px -3px 8px rgba(255,255,255,0.5);
        }

        /* Lobby specific */
        .logo-title {
            font-size: 3rem;
            font-weight: 800;
            color: var(--clay-peach);
            text-shadow: 4px 4px 8px rgba(0,0,0,0.4);
            margin-bottom: 40px;
            text-align: center;
        }

        .player-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(0,0,0,0.15);
            border-radius: 16px;
            margin-bottom: 8px;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.3), inset -2px -2px 5px rgba(255,255,255,0.03);
            animation: showPlayer 0.3s ease-out;
        }
        @keyframes showPlayer {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .player-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--clay-purple);
            color: var(--text-dark);
            font-weight: 800;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.1rem;
            box-shadow: inset 2px 2px 4px rgba(255,255,255,0.7), inset -2px -2px 4px rgba(0,0,0,0.2);
        }
        .player-name {
            font-weight: 600;
            font-size: 1rem;
        }

        /* Game specific */
        .status-text {
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }
        .task-card {
            color: var(--clay-peach);
            font-size: 1.25rem;
            font-weight: 600;
            transition: opacity 0.3s;
            margin-top: 20px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .personal-timer {
            font-size: 5rem;
            font-weight: 800;
            color: var(--clay-purple);
            text-shadow: 4px 4px 8px rgba(0,0,0,0.4), -2px -2px 4px rgba(255,255,255,0.05);
            margin: 20px 0;
            font-variant-numeric: tabular-nums;
            transition: opacity 0.3s;
        }

        #potato-area {
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #potato-container {
            width: 240px;
            height: 240px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
        }
        #potato-pulse-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            will-change: transform;
        }
        .potato {
            width: 180px;
            height: 180px;
            background: linear-gradient(135deg, var(--clay-blue), var(--clay-purple));
            border-radius: 50% 50% 50% 50% / 50% 50% 50% 50%;
            animation: morph 6s ease-in-out infinite;
            box-shadow: 
                15px 15px 30px rgba(0, 0, 0, 0.4), 
                -10px -10px 25px rgba(255, 255, 255, 0.02),
                inset -10px -10px 20px rgba(0, 0, 0, 0.2), 
                inset 10px 10px 20px rgba(255, 255, 255, 0.7);
        }

        @keyframes morph {
            0% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
            50% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
            100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
        }

    </style>
</head>
<body>

    <div id="app">
        <!-- START SCREEN -->
        <div id="screen-start" class="screen active">
            <h1 class="logo-title">WET POTATO</h1>
            <button class="clay-btn" id="btn-create-lobby">Создать игру</button>
        </div>

        <!-- LOBBY SCREEN -->
        <div id="screen-lobby" class="screen">
            <h1 class="logo-title" style="font-size: 2rem; margin-bottom: 20px;">Лобби</h1>
            <div class="clay-card">
                <div id="lobby-players">
                    <!-- Заполняется JS -->
                </div>
                
                <button class="clay-btn" id="btn-invite" style="background-color: var(--clay-purple); font-size: 0.9rem; padding: 12px;">Пригласить друзей</button>
                <button class="clay-btn" id="btn-start-game" style="display:none; background-color: #22c55e; color: white;">Начать</button>
                <div id="wait-host-msg" style="display:none; color: var(--text-muted); font-size: 0.9rem; margin-top: -10px;">Ожидание создателя...</div>
            </div>
        </div>

        <!-- GAME SCREEN -->
        <div id="screen-game" class="screen">
            <div id="status-text" class="status-text">Ожидание первого хода...</div>
            <div id="task-display" class="clay-card task-card" style="opacity: 0;">Задание появится здесь</div>
            <div id="personal-timer" class="personal-timer" style="opacity: 0;">10.0</div>
            
            <div id="potato-area">
                <div id="potato-container" style="opacity: 0; transform: scale(0);">
                    <div id="potato-pulse-wrapper">
                        <div class="potato"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- GAMEOVER SCREEN -->
        <div id="screen-gameover" class="screen">
            <div class="clay-card">
                <h1 style="color: var(--danger); font-size: 3rem; text-shadow: 3px 3px 6px rgba(0,0,0,0.4);">BOOM!</h1>
                <h2 id="loser-name" style="margin: 10px 0 20px 0;">ИМЯ ВЗОРВАЛСЯ!</h2>
                <button class="clay-btn" id="btn-to-lobby">В лобби</button>
            </div>
        </div>
    </div>

    <script>
        // Предотвращение нативного скролла
        document.body.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

        // Telegram WebApp Setup
        const tg = window.Telegram?.WebApp || {};
        const isTg = !!tg.initData;
        if(isTg) {
            tg.expand();
            tg.enableClosingConfirmation();
        }

        // Parse Init Data Unsafe
        let initData = tg.initDataUnsafe || {};
        let startParam = initData.start_param || null;
        
        // Fallback for browser direct URL testing
        if (!startParam && window.location.search.includes('startapp=')) {
            startParam = new URLSearchParams(window.location.search).get('startapp');
        }

        let currentUser = initData.user || {
            id: Math.floor(Math.random() * 100000),
            first_name: "Игрок " + Math.floor(Math.random() * 100)
        };

        // --- Tasks Bank (50) ---
        const tasks = [
            "Назови 3 марки авто", "Покажи язык всем", "Скажи алфавит наоборот", "Назови 3 фильма ужасов", "Мычи мелодию",
            "Придумай рифму к слову Картошка", "Потрогай уши соседа", "Скажи 5 слов на букву П", "Зажмурься и посчитай до 10", "Назови 3 круглых фрукта",
            "Расскажи короткую шутку", "Назови 3 песни про Новый Год", "Изобрази злого кота", "Сделай смешную гримасу", "Назови 3 столицы Европы",
            "Подмигни 3 раза", "Назови 3 породы собак", "Прокукарекай", "Хрюкни 2 раза", "Назови 3 реки", 
            "Сделай виртуальное колесо", "Мяукни как котенок", "Гавкни как собака", "Посчитай от 10 до 1 вслух", "Назови 3 красных вещи вокруг", 
            "Изобрази обезьяну", "Скажи скороговорку", "Назови 3 планеты", "Назови 3 языка программирования", "Назови 3 вида птиц", 
            "Сделай волну руками", "Сыграй на воздушной гитаре", "Назови 3 овоща", "Пошли воздушный поцелуй", "Назови 3 вида спорта", 
            "Изобрази зомби", "Назови 3 марки телефона", "Покрутись на месте", "Назови 3 горячих напитка", "Изобрази пингвина", 
            "Назови 3 супергероя", "Назови 3 предмета в комнате", "Дай пять воздуху", "Назови 3 музыкальных инструмента", "Изобрази плавание", 
            "Назови 3 ягоды", "Назови 3 станции метро", "Расскажи секрет шепотом", "Назови 3 вида транспорта", "Изобрази робота"
        ];

        // --- Simulated Network Manager ---
        class NetworkManager {
            constructor() {
                this.lobbyId = null;
                this.players = [];
                this.isHost = false;
                
                this.onPlayerJoined = null;
                this.onGameStarted = null;
                this.onPotatoReceived = null;
                
                this.botTimers = [];
                this.botPassBack = null;
            }

            connect(lobbyId, isHost = false) {
                this.lobbyId = lobbyId;
                this.isHost = isHost;
                
                // Добавляем себя
                this.players.push({ id: currentUser.id, name: currentUser.first_name, isHost });
                if (this.onPlayerJoined) this.onPlayerJoined(this.players);

                // Если мы хост - симулируем подключение других
                if (isHost) {
                    this.botTimers.push(setTimeout(() => {
                        this.players.push({ id: 2, name: "bot_Alex" });
                        if (this.onPlayerJoined) this.onPlayerJoined(this.players);
                        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                    }, 1500));

                    this.botTimers.push(setTimeout(() => {
                        this.players.push({ id: 3, name: "bot_Maria" });
                        if (this.onPlayerJoined) this.onPlayerJoined(this.players);
                        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                    }, 3500));
                } else {
                    // Симулируем, что лобби уже существует
                    this.players.push({ id: 1, name: "Лобби Хост", isHost: true });
                    if (this.onPlayerJoined) this.onPlayerJoined(this.players);
                    
                    // Хост автоматически стартует через 4 сек
                    this.botTimers.push(setTimeout(() => {
                        if (this.onGameStarted) this.onGameStarted();
                    }, 4000));
                }
            }

            startGame() {
                if (this.onGameStarted) this.onGameStarted();
                // Хост берет картошку себе для старта
                setTimeout(() => {
                    if (this.onPotatoReceived) this.onPotatoReceived();
                }, 1000);
            }

            sendPotato(targetUserId) {
                // Симуляция задержки бота (от 1.5 до 3 сек), затем он перекидывает обратно нам
                let delay = 1500 + Math.random() * 1500;
                this.botPassBack = setTimeout(() => {
                    // Бот отдает картошку обратно (если игра еще идет)
                    if (currentScreen === 'GAME' && !isGameOver) {
                        if (this.onPotatoReceived) this.onPotatoReceived();
                    }
                }, delay);
            }

            cleanup() {
                this.botTimers.forEach(t => clearTimeout(t));
                if (this.botPassBack) clearTimeout(this.botPassBack);
            }
        }

        // --- Game Core State ---
        let network = new NetworkManager();
        let currentScreen = 'START';
        let isGameOver = false;
        
        let globalTimer = 0; // Скрытый глобальный 20-45
        let personalTimer = 0; // 10
        let hasPotato = false;
        
        let pulsePhase = 0;
        let lastTime = performance.now();
        let lastTimeStrDisplay = "10.0";

        // UI Links
        const ui = {
            statusText: document.getElementById('status-text'),
            taskDisplay: document.getElementById('task-display'),
            personalTimer: document.getElementById('personal-timer'),
            wrapper: document.getElementById('potato-pulse-wrapper'),
            container: document.getElementById('potato-container')
        };

        // --- App Initialization ---
        function initApp() {
            if (startParam) {
                joinLobby(startParam, false);
            } else {
                showScreen('START');
            }
        }
        
        function showScreen(name) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(`screen-${name.toLowerCase()}`).classList.add('active');
            currentScreen = name;
        }

        // 1. Создать новую игру (Lobby)
        document.getElementById('btn-create-lobby').addEventListener('click', () => {
            let newLobbyId = "lobby_" + Math.random().toString(36).substring(2, 8);
            joinLobby(newLobbyId, true);
        });

        // 2. Логика Лобби
        function joinLobby(lobbyId, isHost = false) {
            showScreen('LOBBY');
            
            if (isHost) {
                document.getElementById('btn-start-game').style.display = 'block';
                document.getElementById('wait-host-msg').style.display = 'none';
            } else {
                document.getElementById('btn-start-game').style.display = 'none';
                document.getElementById('wait-host-msg').style.display = 'block';
            }

            network.onPlayerJoined = (players) => {
                let list = document.getElementById('lobby-players');
                list.innerHTML = '';
                players.forEach(p => {
                    let initials = p.name ? p.name.substring(0,2).toUpperCase() : '??';
                    list.innerHTML += `
                        <div class="player-row">
                            <div class="player-avatar">${initials}</div>
                            <div class="player-name">${p.name} ${p.isHost ? '(Host)' : ''}</div>
                        </div>`;
                });
            };

            network.onGameStarted = () => startRound();
            network.onPotatoReceived = () => localReceivePotato();

            network.connect(lobbyId, isHost);
        }

        // Inline Invite
        document.getElementById('btn-invite').addEventListener('click', () => {
             if (tg.switchInlineQuery) {
                 tg.switchInlineQuery(network.lobbyId, ["users", "groups"]);
             } else {
                 alert("Ссылка: https://t.me/варин_бот?startapp=" + network.lobbyId);
             }
        });

        document.getElementById('btn-start-game').addEventListener('click', () => {
            network.startGame();
        });

        // 3. Начало раунда
        function startRound() {
            isGameOver = false;
            hasPotato = false;
            // Рандомный глобальный таймер: от 20 до 45 сек
            globalTimer = 20 + Math.random() * 25;
            
            ui.statusText.innerText = "Ожидание первого хода...";
            ui.taskDisplay.style.opacity = '0';
            ui.personalTimer.style.opacity = '0';
            
            ui.container.style.transition = 'none';
            ui.container.style.opacity = '0';
            ui.container.style.transform = 'scale(0)';
            
            showScreen('GAME');
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        // 4. Главный Игровой Цикл
        function gameLoop(time) {
            if (currentScreen !== 'GAME' || isGameOver) {
                lastTime = time;
                if(!isGameOver) requestAnimationFrame(gameLoop);
                return;
            }

            let dt = (time - lastTime) / 1000;
            if (dt > 0.1) dt = 0.1; // защита от лагов
            lastTime = time;

            globalTimer -= dt;

            if (hasPotato) {
                personalTimer -= dt;
                updatePulse(dt);

                let tStr = Math.max(0, personalTimer).toFixed(1);
                if (tStr !== lastTimeStrDisplay) {
                    ui.personalTimer.innerText = tStr;
                    lastTimeStrDisplay = tStr;
                }

                // Условия смерти (если у меня картошка)
                if (personalTimer <= 0 || globalTimer <= 0) {
                    triggerGameOver(currentUser.first_name);
                    return;
                }
            } else {
                // Если не у меня, но глобальный вышел -> взорвался кто-то из ботов
                if (globalTimer <= 0) {
                    triggerGameOver("Кто-то из игроков");
                    return;
                }
            }

            requestAnimationFrame(gameLoop);
        }

        // Функция Пульса и Отдачи (Haptic)
        function updatePulse(dt) {
            // Множитель скорости зависит от оставшегося времени (чем меньше - тем больше множитель 1x -> 4x)
            let speedMult = 1 + (10 - Math.max(0, personalTimer)) * 0.3;
            let pulseRate = Math.PI * 2 * speedMult; // 1 пульс в секунду базово
            
            let oldPhase = pulsePhase;
            pulsePhase += dt * pulseRate;
            
            // Визуальный скейл на враппер картошки
            let scale = 1 + Math.sin(pulsePhase) * 0.08;
            ui.wrapper.style.transform = `scale(${scale})`;
            
            // Проверка завершения полного цикла для Haptic
            let oldCycle = Math.floor(oldPhase / (Math.PI * 2));
            let newCycle = Math.floor(pulsePhase / (Math.PI * 2));
            
            if (newCycle > oldCycle && window.Telegram?.WebApp?.HapticFeedback) {
                if (personalTimer > 6) {
                    tg.HapticFeedback.impactOccurred('light');
                } else if (personalTimer > 3) {
                    tg.HapticFeedback.impactOccurred('medium');
                } else {
                    tg.HapticFeedback.impactOccurred('heavy');
                }
            }
        }

        // 5. Обработка Получения картошки
        function localReceivePotato() {
            hasPotato = true;
            personalTimer = 10;
            pulsePhase = 0;
            
            ui.statusText.innerText = "ТВОЙ ХОД!";
            ui.taskDisplay.innerText = tasks[Math.floor(Math.random() * tasks.length)];
            
            ui.taskDisplay.style.opacity = '1';
            ui.personalTimer.style.opacity = '1';
            
            if (window.Telegram?.WebApp?.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning');
            
            ui.container.style.transition = 'none';
            ui.container.style.transform = `translate(0, -${window.innerHeight/2}px) scale(0.5)`;
            ui.container.style.opacity = '0';
            
            void ui.container.offsetWidth; // flush CSS
            
            ui.container.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease';
            ui.container.style.transform = `translate(0px, 0px) scale(1)`;
            ui.container.style.opacity = '1';
        }

        // 6. Свайпы и передача (Touch Events)
        let isDragging = false;
        let startX=0, startY=0, curX=0, curY=0;

        ui.container.addEventListener('touchstart', e => {
            if (currentScreen !== 'GAME' || !hasPotato || isGameOver) return;
            isDragging = true;
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            curX = startX;
            curY = startY;
            ui.container.style.transition = 'none';
        });

        ui.container.addEventListener('touchmove', e => {
            if (!isDragging || !hasPotato) return;
            curX = e.touches[0].clientX;
            curY = e.touches[0].clientY;
            ui.container.style.transform = `translate(${(curX - startX) * 0.5}px, ${(curY - startY) * 0.5}px)`;
        });

        ui.container.addEventListener('touchend', e => {
            if (!isDragging || !hasPotato) return;
            isDragging = false;
            
            let dx = curX - startX;
            let dy = curY - startY;
            let dist = Math.hypot(dx, dy);
            
            if (dist > 40) {
                // Свайп засчитан
                let angle = Math.atan2(dy, dx);
                localPassPotato(angle);
            } else {
                // Возврат
                ui.container.style.transition = 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                ui.container.style.transform = 'translate(0px, 0px)';
                setTimeout(() => ui.container.style.transition = 'none', 300);
            }
        });

        function localPassPotato(angle) {
            hasPotato = false;
            
            ui.taskDisplay.style.opacity = '0';
            ui.personalTimer.style.opacity = '0';
            ui.statusText.innerText = "Идет передача...";
            
            if (window.Telegram?.WebApp?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            
            let flyDist = window.innerWidth * 1.5;
            ui.container.style.transition = 'transform 0.4s ease-out, opacity 0.3s ease';
            ui.container.style.transform = `translate(${Math.cos(angle)*flyDist}px, ${Math.sin(angle)*flyDist}px) scale(0.3)`;
            ui.container.style.opacity = '0';
            
            network.sendPotato('random_bot_or_user');
        }

        // 7. ВЗРЫВ / Конец игры
        function triggerGameOver(loserName) {
            isGameOver = true;
            
            if (window.Telegram?.WebApp?.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('rigid');
                tg.HapticFeedback.notificationOccurred('error');
            }
            
            document.getElementById('loser-name').innerText = `${loserName} ВЗОРВАЛСЯ!`;
            showScreen('GAMEOVER');
        }

        document.getElementById('btn-to-lobby').addEventListener('click', () => {
            network.cleanup(); // Останавливаем таймеры ботов на всякий случай
            // Простейший возврат в главное меню
            network = new NetworkManager();
            initApp();
        });

        // Start
        initApp();

    </script>
</body>
</html>
