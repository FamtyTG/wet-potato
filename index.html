<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wet Potato</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Upgraded Premium Dark Clay Palette */
            --bg-color: #1a1818;       
            --card-bg: #2b2725;        
            --btn-peach: #fcb69a;      
            --btn-mint: #9adbc7;       
            --btn-purple: #c3addb;     
            --text-light: #fff6ee;     
            --text-dark: #1a1818;      
            --text-muted: #857a76;     
            --danger: #ff5454;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 50% 20%, #2f2a28 0%, var(--bg-color) 80%);
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            touch-action: none;
        }

        /* Фона больше нет */

        /* Fade/Curtain Transition */
        .curtain {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: var(--bg-color);
            z-index: 1000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease, background-color 0.2s;
        }
        .curtain.active {
            opacity: 1;
        }

        #app {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            padding: 24px;
        }
        .screen.active {
            opacity: 1;
            pointer-events: auto;
        }
        
        #screen-game {
            justify-content: flex-start;
            padding-top: 50px;
        }

        /* 
         * Soft Clay UI Components
         */
        .clay-card {
            background-color: var(--card-bg);
            border-radius: 40px;
            padding: 35px 25px;
            box-shadow: 
                15px 15px 35px rgba(0, 0, 0, 0.5),                 
                inset 2px 2px 8px rgba(255, 255, 255, 0.06),     
                inset -3px -3px 10px rgba(0, 0, 0, 0.3);         
            border: 1px solid rgba(255,255,255,0.03);
            width: 100%;
            max-width: 350px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .clay-btn {
            border: none;
            border-radius: 30px;
            padding: 18px 26px;
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text-dark);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            box-shadow: 
                8px 8px 20px rgba(0,0,0,0.4),
                inset 3px 3px 8px rgba(255,255,255,0.5),
                inset -3px -3px 8px rgba(0,0,0,0.15);
        }
        .clay-btn:active {
            transform: scale(0.95) translateY(2px);
            box-shadow: 
                3px 3px 10px rgba(0,0,0,0.3),
                inset 5px 5px 10px rgba(0,0,0,0.2),
                inset -2px -2px 5px rgba(255,255,255,0.25);
        }

        .diff-btn {
            background: rgba(0,0,0,0.3); border: none; border-radius: 12px; padding: 12px 5px; color: var(--text-muted);
            font-size: 0.85rem; font-weight: 800; cursor: pointer; transition: all 0.2s; flex: 1; text-transform: uppercase;
        }
        .diff-btn.active {
            background: var(--btn-peach); color: var(--text-dark); box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .input-code {
            background-color: #2e2a29;
            border: none;
            outline: none;
            border-radius: 20px;
            padding: 16px;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-light);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 5px;
            width: 100%;
            margin-bottom: 5px;
            box-shadow: 
                inset 4px 4px 10px rgba(0,0,0,0.4), 
                inset -2px -2px 5px rgba(255,255,255,0.03);
            font-family: 'Inter', sans-serif;
        }
        .input-code::placeholder {
            color: rgba(255,255,255,0.1);
        }

        /* Typography & Layouts */
        .logo-title {
            font-size: 3.2rem;
            font-weight: 800;
            color: var(--btn-peach);
            text-shadow: 4px 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.1;
        }

        .player-row {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            margin-bottom: 10px;
            box-shadow: inset 2px 2px 6px rgba(0,0,0,0.3), inset -1px -1px 3px rgba(255,255,255,0.02);
            animation: showPlayer 0.3s ease-out;
        }
        @keyframes showPlayer {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .player-avatar {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: var(--btn-purple);
            color: var(--text-dark);
            font-weight: 800;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            box-shadow: inset 2px 2px 5px rgba(255,255,255,0.6), inset -2px -2px 5px rgba(0,0,0,0.2);
        }
        .player-name {
            font-weight: 600;
            font-size: 1.05rem;
            letter-spacing: 0.5px;
        }

        /* Game UI */
        .players-bar {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            width: 100%;
        }
        .p-avatar-mini {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--card-bg);
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 800;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.3), inset -1px -1px 3px rgba(255,255,255,0.05);
            transition: all 0.3s ease;
            position: relative;
        }
        .p-avatar-mini.active {
            box-shadow: 0 0 15px rgba(245, 188, 169, 0.4), inset 2px 2px 5px rgba(255,255,255,0.6);
            background: var(--btn-peach);
            color: var(--text-dark);
            transform: scale(1.15);
            z-index: 5;
        }
        .p-avatar-mini.dead {
            opacity: 0.3;
            transform: scale(0.9);
            filter: grayscale(1);
        }
        .p-avatar-mini.dead::after {
            content: "✖";
            position: absolute;
            color: var(--danger);
            font-size: 1.5rem;
            font-weight: 900;
            text-shadow: 1px 1px 2px #000;
        }

        .status-text {
            color: var(--text-muted);
            font-size: 1.05rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            margin-bottom: 5px;
            height: 20px;
        }
        .task-card {
            color: var(--btn-peach);
            font-size: 1.35rem; /* чуть крупнее для читабельности */
            font-weight: 600;
            transition: opacity 0.3s, color 0.3s;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 1.3;
            margin-bottom: 5px;
            padding: 20px 25px;
        }
        .personal-timer {
            font-size: 5.5rem;
            font-weight: 800;
            color: var(--btn-purple);
            text-shadow: 5px 5px 12px rgba(0,0,0,0.4);
            margin: 5px 0 15px 0;
            font-variant-numeric: tabular-nums;
            transition: opacity 0.3s;
        }

        #potato-area {
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #potato-container {
            width: 260px;
            height: 260px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
        }
        #potato-pulse-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            will-change: transform;
            cursor: grab;
        }
        #potato-pulse-wrapper:active {
            cursor: grabbing;
        }

        .potato-img {
            width: 240px;
            filter: drop-shadow(0px 20px 25px rgba(0, 0, 0, 0.5));
            animation: floatPotato 4s ease-in-out infinite, slightRotate 8s linear infinite;
        }

        @keyframes floatPotato {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        @keyframes slightRotate {
            0% { transform: rotate(-8deg); }
            50% { transform: rotate(8deg); }
            100% { transform: rotate(-8deg); }
        }
    </style>
</head>
<body>

    <!-- Общий слой затемнения -->
    <div class="curtain" id="curtain"></div>

    <div id="app">
        <!-- СТАРТ -->
        <div id="screen-start" class="screen active">
            <h1 class="logo-title">WET<br>POTATO</h1>
            <button class="clay-btn" id="btn-create-lobby" style="background-color: var(--btn-peach); width: 100%; max-width: 320px; font-size: 1.15rem; padding: 20px; margin-bottom: 40px;">Создать лобби</button>
            
            <div class="clay-card">
                <p style="margin-bottom: 5px; font-weight: 600; font-size: 0.95rem; color: var(--text-muted);">Или введите код комнаты</p>
                <input type="text" id="join-code-input" class="input-code" placeholder="----" maxlength="5">
                <button class="clay-btn" id="btn-join-code" style="background-color: var(--btn-purple); width: 100%;">Войти по коду</button>
            </div>
        </div>

        <!-- ЛОББИ -->
        <div id="screen-lobby" class="screen">
            <div class="clay-card">
                <h2 style="color: var(--btn-peach); font-size: 1rem; text-transform: uppercase; letter-spacing: 2px;">Код лобби</h2>
                <h1 id="lobby-id-display" style="font-size: 4rem; letter-spacing: 8px; margin: 0 0 20px 0; text-shadow: 3px 3px 6px rgba(0,0,0,0.3);"></h1>
                
                <div id="lobby-players" style="margin-bottom: 15px;"></div>
                
                <button class="clay-btn" id="btn-invite" style="background-color: var(--btn-purple); width: 100%;">Пригласить друзей</button>
                
                <div id="difficulty-selector" style="display:none; margin-top: 20px;">
                    <div style="font-size: 0.85rem; font-weight:800; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase;">Сложность (для всех)</div>
                    <div style="display: flex; gap: 8px; justify-content: center;">
                        <button class="diff-btn active" data-diff="easy">Лёгкая</button>
                        <button class="diff-btn" data-diff="medium">Средняя</button>
                        <button class="diff-btn" data-diff="hard">Сложная</button>
                    </div>
                </div>

                <button class="clay-btn" id="btn-start-game" style="display:none; background-color: var(--btn-mint); width: 100%; color: var(--text-dark); margin-top: 15px;">Начать игру</button>
                <div id="wait-host-msg" style="display:none; color: var(--text-muted); font-size: 0.9rem; margin-top: 15px;">Ожидание создателя...</div>
            </div>
        </div>

        <!-- ИГРА -->
        <div id="screen-game" class="screen">
            <button class="clay-btn" id="btn-leave-spectate" style="display:none; position: absolute; top: 20px; right: 20px; padding: 10px 15px; background: rgba(0,0,0,0.4); font-size: 0.85rem; border-radius: 15px; color: var(--text-muted); box-shadow: none;">В меню</button>
            <div id="players-bar" class="players-bar"></div>
            
            <div id="status-text" class="status-text">Ожидание...</div>
            <div id="task-display" class="clay-card task-card" style="opacity: 0;"></div>
            <div id="personal-timer" class="personal-timer" style="opacity: 0;">10.0</div>
            
            <div id="potato-area">
                <div id="potato-container" style="opacity: 0; transform: scale(0);">
                    <div id="potato-pulse-wrapper">
                        <img src="assets/image-Photoroom.png" class="potato-img" alt="Potato" draggable="false" style="pointer-events: none; user-select: none;">
                    </div>
                </div>
            </div>
        </div>

        <!-- GAMEOVER -->
        <div id="screen-gameover" class="screen">
            <div class="clay-card">
                <h1 id="go-title" style="color: var(--danger); font-size: 3.5rem; text-shadow: 3px 3px 6px rgba(0,0,0,0.4);">BOOM!</h1>
                <h2 id="loser-name" style="margin: 10px 0 25px 0; color: var(--text-light); font-size: 1.4rem;"></h2>
                <button class="clay-btn" id="btn-spectate" style="background-color: var(--btn-purple); width: 100%; margin-bottom: 12px; display: none;">Следить за игрой</button>
                <button class="clay-btn" id="btn-to-lobby" style="background-color: var(--btn-peach); width: 100%;">В меню</button>
            </div>
        </div>
    </div>

    <script>
        // Блок нативных свайпов
        document.body.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

        // Telegram WebApp Setup
        const tg = window.Telegram?.WebApp || {};
        const isTg = !!tg.initData;
        if(isTg) {
            tg.expand();
            tg.enableClosingConfirmation();
        }

        // Utils
        function generateCode() {
            let res = '';
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            for (let i = 0; i < 5; i++) res += chars.charAt(Math.floor(Math.random() * chars.length));
            return res;
        }

        let initData = tg.initDataUnsafe || {};
        let startParam = initData.start_param || null;
        if (!startParam && window.location.search.includes('startapp=')) {
            startParam = new URLSearchParams(window.location.search).get('startapp');
        }

        let currentUser = initData.user || {
            id: Math.floor(Math.random() * 100000),
            first_name: "Вы",
            shortInit: "ВЫ"
        };
        currentUser.shortInit = currentUser.first_name.substring(0,2).toUpperCase();

        const diffConfigs = {
            easy: {
                timeMin: 3, timeMax: 5,
                tasks: [
                    "Сколько будет 2 + 2?", "Как тебя зовут?", "Какого цвета небо?", "Назови столицу РФ?", 
                    "Скажи 'Мяу' очень громко!", "Сколько ушей у человека?", "Сколько пальцев на руке?", 
                    "Перечисли времена года!", "Сколько будет 10 минус 5?", "Сейчас день или ночь?",
                    "Три цвета обычного светофора?", "Как делает собака?", "Попрыгай на одной ноге 2 раза!",
                    "Сколько будет 5 + 5?", "Какого цвета солнце?", "Имя твоего лучшего друга?", 
                    "Кошка или собака?", "Какое твое любимое блюдо?", "Быстро моргни 5 раз!", "Реши: 7 минус 2?"
                ]
            },
            medium: {
                timeMin: 6, timeMax: 10,
                tasks: [
                    "Реши уравнение: 15 + 18?", "Назови 3 красных фрукта!", "Быстро скажи любое слово на 'Ц'!",
                    "Назови столицу Японии!", "Сколько лап у паука?", "Назови 3 бренда кроссовок!",
                    "Умножь 7 на 8?", "Скажи свое имя наоборот!", "Назови 3 марки телефонов!",
                    "Вспомни 3 имени на букву 'А'!", "Реши: 45 минус 17?", "Какая планета у Солнца?",
                    "Быстро 5 нечетных чисел!", "Назови 3 столицы Европы!", "Сколько кг в одной тонне?",
                    "Что больше: 1/2 или 0.6?", "Назови 3 реки в России!", "Отсчет: от 15 до 10!"
                ]
            },
            hard: {
                timeMin: 10, timeMax: 15,
                tasks: [
                    "Скажи квадратный корень из 144?", "Столица Мадагаскара?", "Химическая формула воды?", 
                    "Назови 5 штатов США!", "Вспомни первый закон Ньютона?", "3 страны на букву 'В'!",
                    "Сколько элементов в таблице Менделеева?", "Какой был год основания Москвы?",
                    "В чем измеряется сила тока?", "Кто написал 'Войну и мир'?", "Назови формулу площади круга!",
                    "Сколько примерно костей в теле взрослого?", "Назови 4 океана на Земле!", "Сколько будет 15% от 200?", 
                    "Назови ближайшую к нам галактику (не Млечный Путь)!", "Назови 3 сложных языка программирования!"
                ]
            }
        };
        let currentDifficulty = 'easy';

        document.querySelectorAll('.diff-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (!network.isHost) return;
                document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentDifficulty = btn.getAttribute('data-diff');
            });
        });

        class NetworkManager {
            constructor() {
                this.lobbyId = null;
                this.players = [];
                this.isHost = false;
                this.botTimers = [];
                this.botPassBack = null;
            }

            connect(lobbyId, isHost = false) {
                this.lobbyId = lobbyId.toUpperCase();
                this.isHost = isHost;
                
                this.players.push({ id: currentUser.id, name: currentUser.first_name, initials: currentUser.shortInit, isHost: isHost, isDead: false });
                updateLobbyUI();

                if (isHost) {
                    this.botTimers.push(setTimeout(() => {
                        this.players.push({ id: 2, name: "Иван (Bot)", initials: "ИВ", isHost: false, isDead: false });
                        updateLobbyUI();
                        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                    }, 1200));
                    this.botTimers.push(setTimeout(() => {
                        this.players.push({ id: 3, name: "Ксюша (Bot)", initials: "КС", isHost: false, isDead: false });
                        updateLobbyUI();
                        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                    }, 2800));
                } else {
                    this.players.push({ id: 999, name: "Лобби Хост", initials: "ХО", isHost: true, isDead: false });
                    updateLobbyUI();
                    
                    this.botTimers.push(setTimeout(() => {
                        if (currentScreen === 'LOBBY') startRound();
                    }, 4000));
                }
            }

            startBotTimer(botId) {
                let delay = 2000 + Math.random() * 2000;
                this.botPassBack = setTimeout(() => {
                    if (currentScreen === 'GAME' && !isGameOver && currentTurnPlayerId === botId) {
                        this.sendPotato();
                    }
                }, delay);
            }

            sendPotato() {
                let aliveBots = this.players.filter(p => !p.isDead && p.id !== currentTurnPlayerId);
                if (aliveBots.length === 0) return; 
                
                let target = aliveBots[Math.floor(Math.random() * aliveBots.length)];
                
                triggerCurtain(() => {
                    setTurn(target.id);
                    if (target.id !== currentUser.id) {
                        this.startBotTimer(target.id);
                    }
                });
            }

            clearBotTimers() {
                this.botTimers.forEach(t => clearTimeout(t));
                if (this.botPassBack) clearTimeout(this.botPassBack);
            }
        }

        // --- Core State ---
        let network = new NetworkManager();
        let currentScreen = 'START';
        let isGameOver = false;
        let isCurtainActive = false;
        
        let globalTimer = 0; 
        let personalTimer = 0; 
        let currentTurnPlayerId = null;
        let currentTaskString = "";
        
        let pulsePhase = 0;
        let lastTime = performance.now();
        let lastTimeStrDisplay = "10.0";

        const ui = {
            curtain: document.getElementById('curtain'),
            statusText: document.getElementById('status-text'),
            taskDisplay: document.getElementById('task-display'),
            personalTimer: document.getElementById('personal-timer'),
            wrapper: document.getElementById('potato-pulse-wrapper'),
            container: document.getElementById('potato-container'),
            playersBar: document.getElementById('players-bar')
        };

        function showScreen(name) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(`screen-${name.toLowerCase()}`).classList.add('active');
            currentScreen = name;
        }

        function triggerCurtain(callback) {
            if(isCurtainActive) return;
            isCurtainActive = true;
            ui.curtain.classList.add('active');
            setTimeout(() => {
                callback();
                ui.curtain.classList.remove('active');
                isCurtainActive = false;
            }, 300);
        }

        if (startParam) joinLobby(startParam, false);
        else showScreen('START');

        document.getElementById('btn-create-lobby').addEventListener('click', () => joinLobby(generateCode(), true));

        const codeInput = document.getElementById('join-code-input');
        codeInput.addEventListener('input', function() { this.value = this.value.toUpperCase(); });
        document.getElementById('btn-join-code').addEventListener('click', () => {
            let val = codeInput.value.trim();
            if(val.length > 0) joinLobby(val, false);
        });

        function joinLobby(lobbyId, isHost = false) {
            showScreen('LOBBY');
            document.getElementById('lobby-id-display').innerText = lobbyId;
            document.getElementById('btn-start-game').style.display = isHost ? 'block' : 'none';
            document.getElementById('difficulty-selector').style.display = isHost ? 'block' : 'none';
            document.getElementById('wait-host-msg').style.display = isHost ? 'none' : 'block';
            network.connect(lobbyId, isHost);
        }

        function updateLobbyUI() {
            let list = document.getElementById('lobby-players');
            list.innerHTML = '';
            network.players.forEach(p => {
                list.innerHTML += `
                    <div class="player-row">
                        <div class="player-avatar">${p.initials}</div>
                        <div class="player-name">${p.name} ${p.isHost ? '(Host)' : ''}</div>
                    </div>`;
            });
        }

        document.getElementById('btn-invite').addEventListener('click', () => {
             if (tg.switchInlineQuery) tg.switchInlineQuery(network.lobbyId, ["users", "groups"]);
             else alert("Скопируй ссылку: https://t.me/your_bot?startapp=" + network.lobbyId);
        });

        document.getElementById('btn-start-game').addEventListener('click', () => startRound());

        // --- GAME LOGIC ---

        function updatePlayersBar() {
            ui.playersBar.innerHTML = '';
            network.players.forEach(p => {
                let activeClass = p.id === currentTurnPlayerId ? 'active' : '';
                let deadClass = p.isDead ? 'dead' : '';
                ui.playersBar.innerHTML += `<div class="p-avatar-mini ${activeClass} ${deadClass}">${p.initials}</div>`;
            });
        }

        let currentTaskAnswer = "";

        function setTurn(playerId) {
            currentTurnPlayerId = playerId;
            let cfg = diffConfigs[currentDifficulty];
            personalTimer = cfg.timeMin + Math.random() * (cfg.timeMax - cfg.timeMin);
            pulsePhase = 0;
            
            // 2. Отображение задания синхронно
            let pool = cfg.tasks;
            currentTaskString = pool[Math.floor(Math.random() * pool.length)];
            
            updatePlayersBar();
            
            if (playerId === currentUser.id) {
                // Мой ход
                ui.taskDisplay.innerHTML = `<span style="font-size:0.95rem; color:var(--text-muted); display:block; margin-bottom:8px; letter-spacing: 2px;">ЗАДАНИЕ:</span><span style="font-size: 1.4rem;">${currentTaskString}</span>`;
                ui.taskDisplay.style.opacity = '1';
                ui.taskDisplay.style.color = 'var(--btn-peach)';
                
                ui.personalTimer.style.opacity = '1';
                ui.statusText.innerText = "ТВОЙ ХОД!";
                ui.statusText.style.color = 'var(--btn-mint)'; // Highlight self text
                
                if (window.Telegram?.WebApp?.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning');
                
                ui.container.style.transition = 'none';
                ui.container.style.transform = `translate(0, -${window.innerHeight/2}px) scale(0.5)`;
                ui.container.style.opacity = '0';
                void ui.container.offsetWidth; 
                
                ui.container.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease';
                ui.container.style.transform = `translate(0px, 0px) scale(1)`;
                ui.container.style.opacity = '1';
            } else {
                // Чужой ход - Spectator Mode Fix
                let pName = network.players.find(p => p.id === playerId)?.name || 'Игрок';
                ui.taskDisplay.innerHTML = `<span style="font-size:0.95rem; color:var(--text-muted); display:block; margin-bottom:8px; letter-spacing: 2px;">РЕШАЕТ ${pName.toUpperCase()}:</span><span style="font-size: 1.25rem;">${currentTaskString}</span><div style="margin-top: 15px; font-size: 0.95rem; color: var(--text-muted); background: rgba(0,0,0,0.25); border-radius: 12px; padding: 10px;">Ответ: <span style="font-weight: 800; color: var(--btn-purple)">${currentTaskAnswer}</span></div><button onclick="voteKick()" style="margin-top: 15px; background-color: var(--danger); border: none; border-radius: 20px; padding: 8px 15px; color: white; font-weight: 800; font-size: 0.85rem; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); text-transform: uppercase;">Не верим! (Сжечь)</button>`;
                ui.taskDisplay.style.opacity = '1';
                ui.taskDisplay.style.color = 'var(--text-light)';
                
                ui.personalTimer.style.opacity = '0.7';
                ui.statusText.innerText = "ЧУЖОЙ ХОД";
                ui.statusText.style.color = 'var(--text-muted)';
                
                ui.container.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.5s ease';
                ui.container.style.transform = `translate(0px, 0px) scale(0.65)`;
                ui.container.style.opacity = '0.6';
            }
        }

        function startRound() {
            isGameOver = false;
            globalTimer = 20 + Math.random() * 25; 
            network.players.forEach(p => p.isDead = false);
            
            ui.statusText.innerText = "Подготовка...";
            ui.taskDisplay.style.opacity = '0';
            ui.personalTimer.style.opacity = '0';
            ui.container.style.opacity = '0';
            
            showScreen('GAME');
            setTurn(currentUser.id);

            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function gameLoop(time) {
            if (currentScreen !== 'GAME' || isGameOver) {
                lastTime = time;
                if(!isGameOver) requestAnimationFrame(gameLoop);
                return;
            }

            let dt = (time - lastTime) / 1000;
            if (dt > 0.1) dt = 0.1;
            lastTime = time;

            globalTimer -= dt;
            personalTimer -= dt;
            
            updatePulse(dt, currentTurnPlayerId === currentUser.id);

            let tStr = Math.max(0, personalTimer).toFixed(1);
            if (tStr !== lastTimeStrDisplay) {
                ui.personalTimer.innerText = tStr;
                lastTimeStrDisplay = tStr;
            }

            if (personalTimer <= 0 || globalTimer <= 0) {
                handleExplosion();
                return;
            }

            requestAnimationFrame(gameLoop);
        }

        function updatePulse(dt, isMyTurn) {
            let speedMult = 1 + (10 - Math.max(0, personalTimer)) * 0.3;
            let pulseRate = Math.PI * 2 * speedMult;
            
            let oldPhase = pulsePhase;
            pulsePhase += dt * pulseRate;
            
            let scale = 1 + Math.sin(pulsePhase) * 0.08;
            ui.wrapper.style.transform = `scale(${scale})`;
            
            let oldCycle = Math.floor(oldPhase / (Math.PI * 2));
            let newCycle = Math.floor(pulsePhase / (Math.PI * 2));
            
            if (isMyTurn && newCycle > oldCycle && window.Telegram?.WebApp?.HapticFeedback) {
                if (personalTimer > 6) tg.HapticFeedback.impactOccurred('light');
                else if (personalTimer > 3) tg.HapticFeedback.impactOccurred('medium');
                else tg.HapticFeedback.impactOccurred('heavy');
            }
        }

        function handleExplosion() {
            network.clearBotTimers();
            let deadPlayer = network.players.find(p => p.id === currentTurnPlayerId);
            if (deadPlayer) deadPlayer.isDead = true;

            if (!deadPlayer || deadPlayer.id === currentUser.id) {
                triggerGameOver(deadPlayer ? deadPlayer.name : "Вы");
            } else {
                if (window.Telegram?.WebApp?.HapticFeedback) tg.HapticFeedback.impactOccurred('rigid');
                
                ui.taskDisplay.innerHTML = `<span style="font-size: 1.4rem;">${deadPlayer.name} СГОРЕЛ!</span>`;
                ui.taskDisplay.style.color = 'var(--danger)';
                ui.taskDisplay.style.opacity = '1';
                ui.personalTimer.style.opacity = '0';
                ui.container.style.opacity = '0';
                
                ui.curtain.style.backgroundColor = 'var(--danger)';
                ui.curtain.classList.add('active');
                setTimeout(() => { 
                    ui.curtain.classList.remove('active'); 
                    ui.curtain.style.backgroundColor = 'var(--bg-color)'; 
                }, 150);
                
                updatePlayersBar();
                
                let alivePlayers = network.players.filter(p => !p.isDead);
                if (alivePlayers.length <= 1) {
                    setTimeout(() => triggerGameOver("LAST_SURVIVOR"), 2000);
                } else {
                    setTimeout(() => {
                        globalTimer = 20 + Math.random() * 25; 
                        let randomAlive = alivePlayers[Math.floor(Math.random() * alivePlayers.length)];
                        triggerCurtain(() => {
                            setTurn(randomAlive.id);
                            if (randomAlive.id !== currentUser.id) {
                                network.startBotTimer(randomAlive.id);
                            }
                        });
                    }, 2500);
                }
            }
        }

        // --- Движение и Свайпы (Touch + Desktop) ---
        let isDragging = false;
        let startX=0, startY=0, curX=0, curY=0;

        function handleDragStart(clientX, clientY) {
            if (currentScreen !== 'GAME' || isGameOver || currentTurnPlayerId !== currentUser.id) return false;
            isDragging = true;
            startX = clientX;
            startY = clientY;
            curX = startX;
            curY = startY;
            ui.container.style.transition = 'none';
        }

        function handleDragMove(clientX, clientY) {
            if (!isDragging) return;
            curX = clientX;
            curY = clientY;
            ui.container.style.transform = `translate(${(curX - startX) * 0.5}px, ${(curY - startY) * 0.5}px)`;
        }

        function handleDragEnd() {
            if (!isDragging) return;
            isDragging = false;
            
            let dx = curX - startX;
            let dy = curY - startY;
            let dist = Math.hypot(dx, dy);
            
            if (dist > 90) {
                localPassPotato(Math.atan2(dy, dx));
            } else {
                ui.container.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                ui.container.style.transform = 'translate(0px, 0px)';
                setTimeout(() => ui.container.style.transition = 'none', 400);
            }
        }

        ui.container.addEventListener('touchstart', e => handleDragStart(e.touches[0].clientX, e.touches[0].clientY), {passive:false});
        window.addEventListener('touchmove', e => { if(isDragging) handleDragMove(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
        window.addEventListener('touchend', e => handleDragEnd());
        
        ui.container.addEventListener('mousedown', e => handleDragStart(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => { if (isDragging) handleDragMove(e.clientX, e.clientY); });
        window.addEventListener('mouseup', e => handleDragEnd());

        function localPassPotato(angle) {
            if (currentTurnPlayerId !== currentUser.id) return;
            
            ui.taskDisplay.style.opacity = '0';
            ui.personalTimer.style.opacity = '0';
            ui.statusText.innerText = "Улетает...";
            
            if (window.Telegram?.WebApp?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            
            let flyDist = window.innerWidth * 1.5;
            ui.container.style.transition = 'transform 0.4s ease-out, opacity 0.3s ease';
            ui.container.style.transform = `translate(${Math.cos(angle)*flyDist}px, ${Math.sin(angle)*flyDist}px) scale(0.3)`;
            ui.container.style.opacity = '0';
            
            network.sendPotato();
        }

        // --- GAMEOVER ---
        window.voteKick = function() {
            if (currentTurnPlayerId && currentTurnPlayerId !== currentUser.id && !isGameOver) {
                personalTimer = 0; // instantly blow them up
                handleExplosion();
            }
        };

        function triggerGameOver(loserName) {
            isGameOver = true;
            if (window.Telegram?.WebApp?.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('rigid');
                tg.HapticFeedback.notificationOccurred('error');
            }
            
            let aliveCount = network.players.filter(p => !p.isDead).length;

            if (loserName === "LAST_SURVIVOR" || aliveCount <= 1) {
                if (currentUser.isDead) {
                    document.getElementById('go-title').innerText = "ИГРА ОКОНЧЕНА";
                    document.getElementById('go-title').style.color = "var(--btn-purple)";
                    document.getElementById('loser-name').innerText = "Победитель определен!";
                } else {
                    document.getElementById('go-title').innerText = "ПОБЕДА";
                    document.getElementById('go-title').style.color = "var(--btn-mint)";
                    document.getElementById('loser-name').innerText = "Остался только ты!";
                }
                document.getElementById('btn-spectate').style.display = 'none';
            } else {
                document.getElementById('go-title').innerText = "BOOM!";
                document.getElementById('go-title').style.color = "var(--danger)";
                document.getElementById('loser-name').innerText = `${loserName} ВЗОРВАЛСЯ!`;
                document.getElementById('btn-spectate').style.display = 'block';
            }

            showScreen('GAMEOVER');
        }

        document.getElementById('btn-spectate').addEventListener('click', () => {
            isGameOver = false;
            showScreen('GAME');
            document.getElementById('btn-leave-spectate').style.display = 'block';
            let alivePlayers = network.players.filter(p => !p.isDead);
            if (alivePlayers.length > 0) {
                lastTime = performance.now();
                requestAnimationFrame(gameLoop);
                let randomAlive = alivePlayers[Math.floor(Math.random() * alivePlayers.length)];
                triggerCurtain(() => {
                    setTurn(randomAlive.id);
                    if (randomAlive.id !== currentUser.id) {
                        network.startBotTimer(randomAlive.id);
                    }
                });
            }
        });

        document.getElementById('btn-leave-spectate').addEventListener('click', () => {
            document.getElementById('btn-leave-spectate').style.display = 'none';
            network.clearBotTimers(); 
            network = new NetworkManager();
            document.getElementById('join-code-input').value = '';
            showScreen('START');
        });

        document.getElementById('btn-to-lobby').addEventListener('click', () => {
            network.clearBotTimers(); 
            network = new NetworkManager();
            document.getElementById('join-code-input').value = '';
            showScreen('START');
        });

    </script>
</body>
</html>
