<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wet Potato</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0c;
            --accent-gradient: linear-gradient(135deg, #4f46e5 0%, #a855f7 100%);
            --death-color: #ff2e2e;
            --potato-shadow: 0 0 50px rgba(168, 85, 247, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.3s ease;
        }

        #app {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The Wet Potato */
        .potato-container {
            position: relative;
            width: 200px;
            height: 200px;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            z-index: 10;
        }

        .potato {
            width: 100%;
            height: 100%;
            background: var(--accent-gradient);
            box-shadow: var(--potato-shadow);
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            animation: 
                morph 8s ease-in-out infinite alternate,
                pulse var(--pulse-speed, 2s) ease-in-out infinite;
            transition: border-radius 1s ease-in-out;
        }

        @keyframes morph {
            0% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
            50% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
            100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        /* Screens */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
            text-align: center;
            padding: 20px;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            letter-spacing: -2px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status {
            position: absolute;
            bottom: 40px;
            opacity: 0.5;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* "YOU DIED" screen */
        #death-screen {
            background-color: rgba(255, 0, 0, 0.1);
            z-index: 100;
        }

        #death-screen h1 {
            color: var(--death-color);
            -webkit-text-fill-color: var(--death-color);
            font-size: 4rem;
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0% { transform: translate(0,0); }
            25% { transform: translate(-5px, 5px); }
            50% { transform: translate(5px, -5px); }
            75% { transform: translate(-5px, -5px); }
            100% { transform: translate(5px, 5px); }
        }

        /* Explosion Flash */
        .flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--death-color);
            opacity: 0;
            z-index: 99;
            pointer-events: none;
        }

        .flash.active {
            animation: flash-anim 0.5s ease-out;
        }

        @keyframes flash-anim {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* Particles on explosion */
        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--accent-gradient);
            border-radius: 50%;
            pointer-events: none;
        }

        .btn-restart {
            margin-top: 30px;
            padding: 15px 40px;
            border-radius: 30px;
            border: 2px solid white;
            background: transparent;
            color: white;
            font-family: inherit;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-restart:active {
            transform: scale(0.95);
            background: white;
            color: black;
        }
    </style>
</head>
<body>

    <div id="app">
        <div class="flash" id="flash"></div>

        <div id="game-screen" class="screen active">
            <div class="potato-container" id="potato-container">
                <div class="potato" id="potato"></div>
            </div>
            <div class="status" id="game-status">SWIPE TO PASS</div>
        </div>

        <div id="death-screen" class="screen">
            <h1>YOU DIED</h1>
            <button class="btn-restart" onclick="resetGame()">RESPAWN</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        // Game State
        let isDead = false;
        let isPotatoOnScreen = true;
        let timer = null;
        let pulseInterval = null;
        let gameStartTime = 0;
        let bombDelay = 0; // Random 15-40s
        let currentPulseSpeed = 2; // in seconds

        const potatoContainer = document.getElementById('potato-container');
        const potatoElement = document.getElementById('potato');
        const flash = document.getElementById('flash');
        const deathScreen = document.getElementById('death-screen');
        const gameStatus = document.getElementById('game-status');

        // Touch handling
        let touchStartX = 0;
        let touchStartY = 0;

        potatoContainer.addEventListener('touchstart', (e) => {
            if (isDead) return;
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        potatoContainer.addEventListener('touchend', (e) => {
            if (isDead || !isPotatoOnScreen) return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance > 50) {
                passPotato(dx, dy);
            }
        });

        function startGame() {
            isDead = false;
            isPotatoOnScreen = true;
            deathScreen.classList.remove('active');
            potatoContainer.style.opacity = '1';
            potatoContainer.style.transform = 'translate(0, 0) scale(1)';
            gameStatus.innerText = 'PASS THE POTATO';
            
            gameStartTime = Date.now();
            bombDelay = 15000 + Math.random() * 25000; // 15-40s
            
            startPulsing();
            gameLoop();
        }

        function gameLoop() {
            if (isDead) return;

            const elapsed = Date.now() - gameStartTime;
            
            // Adjust pulse speed based on time remaining
            const progress = elapsed / bombDelay;
            currentPulseSpeed = Math.max(0.4, 2 - progress * 1.6);
            potatoElement.style.setProperty('--pulse-speed', `${currentPulseSpeed}s`);

            // Check if exploded
            if (elapsed >= bombDelay) {
                if (isPotatoOnScreen) {
                    explode();
                } else {
                    // If away, reset timer for next "incoming"
                    gameStartTime = Date.now();
                }
            } else {
                requestAnimationFrame(gameLoop);
            }
        }

        function startPulsing() {
            if (pulseInterval) clearInterval(pulseInterval);
            
            const triggerHaptic = () => {
                if (isDead || !isPotatoOnScreen) return;
                
                // Strength depends on pulse speed
                if (currentPulseSpeed < 0.6) {
                    tg.HapticFeedback.impactOccurred('heavy');
                } else if (currentPulseSpeed < 1.2) {
                    tg.HapticFeedback.impactOccurred('medium');
                } else {
                    tg.HapticFeedback.impactOccurred('light');
                }

                // Schedule next haptic based on current pulse
                setTimeout(triggerHaptic, (currentPulseSpeed * 1000) / 2);
            };

            triggerHaptic();
        }

        function passPotato(dx, dy) {
            isPotatoOnScreen = false;
            tg.HapticFeedback.impactOccurred('medium');
            
            // Fly away
            const flyX = dx * 5;
            const flyY = dy * 5;
            potatoContainer.style.transform = `translate(${flyX}px, ${flyY}px) scale(0.2)`;
            potatoContainer.style.opacity = '0';
            gameStatus.innerText = 'POTATO PASSED...';

            // Wait 2-3 seconds
            setTimeout(() => {
                if (isDead) return;
                returnPotato();
            }, 2000 + Math.random() * 1000);
        }

        function returnPotato() {
            // Pick a random side to enter from
            const sides = [
                {x: -300, y: 0},
                {x: 300, y: 0},
                {x: 0, y: -400},
                {x: 0, y: 400}
            ];
            const side = sides[Math.floor(Math.random() * sides.length)];
            
            potatoContainer.style.transition = 'none';
            potatoContainer.style.transform = `translate(${side.x}px, ${side.y}px) scale(0.2)`;
            
            setTimeout(() => {
                potatoContainer.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease';
                potatoContainer.style.transform = 'translate(0, 0) scale(1)';
                potatoContainer.style.opacity = '1';
                isPotatoOnScreen = true;
                gameStatus.innerText = 'IT\'S BACK!';
                tg.HapticFeedback.notificationOccurred('warning');
            }, 50);
        }

        function explode() {
            isDead = true;
            tg.HapticFeedback.notificationOccurred('error');
            tg.HapticFeedback.impactOccurred('heavy');
            
            flash.classList.add('active');
            potatoContainer.style.opacity = '0';
            
            // Create particles
            createParticles();
            
            setTimeout(() => {
                flash.classList.remove('active');
                deathScreen.classList.add('active');
            }, 500);
        }

        function createParticles() {
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = '50%';
                p.style.top = '50%';
                
                const angle = Math.random() * Math.PI * 2;
                const dist = 50 + Math.random() * 150;
                const tx = Math.cos(angle) * dist;
                const ty = Math.sin(angle) * dist;
                
                document.getElementById('app').appendChild(p);
                
                p.animate([
                    { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0)`, opacity: 0 }
                ], {
                    duration: 1000,
                    easing: 'cubic-bezier(0, .9, .57, 1)'
                }).onfinish = () => p.remove();
            }
        }

        function resetGame() {
            startGame();
        }

        // Init
        startGame();

    </script>
</body>
</html>
